<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatureNest - Secure Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">NatureNest 🌿</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html" class="cart-link">Cart <span id="cart-badge" class="badge" style="display: none;">0</span></a></li>
            <li><a id="auth-nav-link" style="cursor: pointer;"></a></li>
        </ul>
    </header>
    <section>
        <div class="add-product-container">
            <h2 style="color: var(--text-dark); margin-bottom: 0.5rem; text-align: center; font-size: 2.2rem; font-weight: 800;">Secure Checkout 🔒</h2>
            <p style="text-align: center; color: var(--text-gray); margin-bottom: 2.5rem; font-size: 1.1rem;">Total Amount to Pay: <strong style="color: var(--primary); font-size: 1.5rem;">₹<span id="checkout-total">0</span></strong></p>
            <form onsubmit="handleCheckout(event)">
                <h3 style="margin-bottom: 1.5rem; color: var(--primary-dark); font-size: 1.2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem;">Delivery Details</h3>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Who is receiving the order?">
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" required placeholder="10-digit mobile number">
                </div>
                <div class="input-group">
                    <label>Delivery Address</label>
                    <input type="text" required placeholder="House No, Street, Landmark">
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>City</label>
                        <input type="text" required placeholder="e.g., Chennai">
                    </div>
                    <div class="input-group">
                        <label>PIN Code</label>
                        <input type="number" required placeholder="600001">
                    </div>
                </div>
                <h3 style="margin-top: 2rem; margin-bottom: 1.5rem; color: var(--primary-dark); font-size: 1.2rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem;">Payment Method</h3>
                <div class="input-group">
                    <select required style="cursor: pointer;">
                        <option value="" disabled selected>Select a payment method...</option>
                        <option value="upi">UPI (GPay, PhonePe, Paytm)</option>
                        <option value="card">Credit / Debit Card</option>
                        <option value="cod">Cash on Delivery (COD)</option>
                    </select>
                </div>
                <button type="submit" class="btn-role btn-green" style="margin-top: 2rem; padding: 1.2rem; font-size: 1.1rem; border-radius: 99px; width: 100%;">Complete Secure Order</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;"><a href="cart.html" style="color: var(--text-gray); text-decoration: none; font-weight: 500; transition: var(--transition);">← Back to Cart</a></p>
        </div>
    </section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
