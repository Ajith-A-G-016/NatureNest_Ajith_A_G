<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatureNest - Join Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">NatureNest 🌿</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html" class="cart-link">Cart <span id="cart-badge" class="badge" style="display: none;">0</span></a></li>
            <li><a id="auth-nav-link" style="cursor: pointer;"></a></li>
        </ul>
    </header>
    <section>
        <div class="login-box" style="max-width: 500px;">
            <h2 id="signup-title" style="margin-bottom: 2rem; color: var(--text-dark); text-align: center; font-size: 2.2rem; font-weight: 800;">Create Account</h2>
            <div style="display: flex; gap: 15px; margin-bottom: 2rem; background: #f1f5f9; padding: 5px; border-radius: 99px;">
                <button type="button" id="btn-farmer" class="btn-role btn-green" style="margin-top: 0; padding: 0.8rem; flex: 1; box-shadow: none; border-radius: 99px;" onclick="setRole('farmer')">Farmer</button>
                <button type="button" id="btn-customer" class="btn-role btn-outline" style="margin-top: 0; padding: 0.8rem; flex: 1; border: none; background: transparent; color: var(--text-gray); border-radius: 99px;" onclick="setRole('customer')">Customer</button>
            </div>
            <form onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label>Email ID</label>
                    <input type="email" id="signup-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label>Create Password</label>
                    <input type="password" id="signup-password" required placeholder="Minimum 8 characters">
                </div>
                <div class="input-group">
                    <label>Location (GPS)</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="signup-location" required placeholder="Click detect or type manually" style="flex: 1;">
                        <button type="button" id="location-btn" class="btn-role btn-green" style="margin: 0; padding: 0 1.2rem; width: auto; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: none;" onclick="getLocation()">📍 Detect</button>
                    </div>
                </div>
                <button type="submit" class="btn-role btn-green" style="padding: 1.2rem; font-size: 1.1rem; margin-top: 1rem; border-radius: 99px; width: 100%;">Create Free Account</button>
            </form>
            <p style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-gray);">
                Already registered? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 700;">Log in here</a>
            </p>
        </div>
    </section>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
